<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DirectAZ — P2P Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 95vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #4a5568;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .header h1 { font-size: 1.3em; }
        .status { font-size: 0.8em; opacity: 0.9; margin-top: 5px; }
        .connection-panel {
            background: #f7f9fc;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        .peer-id-box {
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e0;
            margin-bottom: 10px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
        }
        .connect-area {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 14px;
            min-width: 120px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        button:active { opacity: 0.8; }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f8fafc;
        }
        .message { margin-bottom: 12px; display: flex; flex-direction: column; }
        .message.sent { align-items: flex-end; }
        .message.received { align-items: flex-start; }
        .bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        .sent .bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .received .bubble {
            background: white;
            color: #2d3748;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        .time {
            font-size: 10px;
            color: #a0aec0;
            margin-top: 4px;
            padding: 0 5px;
        }
        .input-area {
            padding: 12px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 8px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 25px;
            font-size: 14px;
        }
        .system-message {
            text-align: center;
            color: #718096;
            font-size: 11px;
            margin: 8px 0;
        }
        .copy-id {
            background: #48bb78;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 11px;
            margin-top: 5px;
            display: inline-block;
        }
        .error-box {
            background: #fed7d7;
            color: #c53030;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>📡 DirectAZ</h1>
            <div class="status" id="statusText">Подключение...</div>
        </div>
        
        <div class="connection-panel">
            <div class="peer-id-box">
                🔑 <strong>Ваш ID:</strong><br>
                <span id="myPeerId">Загрузка...</span>
                <div class="copy-id" onclick="copyMyId()">📋 Скопировать ID</div>
            </div>
            <div class="connect-area">
                <input type="text" id="peerIdInput" placeholder="Введите ID собеседника">
                <button id="connectBtn">🔗 Подключиться</button>
                <button id="disconnectBtn" style="background:#fc8181">❌</button>
            </div>
            <div id="errorBox" class="error-box"></div>
        </div>
        
        <div class="messages-area" id="messagesArea">
            <div class="system-message">✨ Готов к общению!</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="sendBtn">📤</button>
        </div>
    </div>

    <script>
        let peer = null;
        let activeConnection = null;
        let isConnected = false;
        let reconnectAttempts = 0;
        
        const messagesArea = document.getElementById('messagesArea');
        const myPeerIdSpan = document.getElementById('myPeerId');
        const statusText = document.getElementById('statusText');
        const messageInput = document.getElementById('messageInput');
        const errorBox = document.getElementById('errorBox');
        
        function addMessage(text, isSent, isSystem = false) {
            const messageDiv = document.createElement('div');
            if (isSystem) {
                messageDiv.className = 'system-message';
                messageDiv.innerHTML = text;
            } else {
                messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
                const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                messageDiv.innerHTML = `<div class="bubble">${escapeHtml(text)}</div><div class="time">${time}</div>`;
            }
            messagesArea.appendChild(messageDiv);
            messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function addSystemMessage(text) {
            addMessage(text, false, true);
        }
        
        function showError(msg) {
            errorBox.style.display = 'block';
            errorBox.innerHTML = msg;
            setTimeout(() => { errorBox.style.display = 'none'; }, 5000);
        }
        
        function updateStatus(connected, peerId = null) {
            isConnected = connected;
            if (connected && peerId) {
                statusText.innerHTML = `🟢 Подключено к ${peerId.substring(0, 8)}...`;
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                messageInput.disabled = false;
                document.getElementById('sendBtn').disabled = false;
                addSystemMessage(`✅ Подключено! Общайтесь.`);
            } else {
                statusText.innerHTML = `🟡 Не подключено`;
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('disconnectBtn').disabled = true;
                messageInput.disabled = true;
                document.getElementById('sendBtn').disabled = true;
                if (!connected && activeConnection) addSystemMessage(`🔌 Соединение разорвано`);
                activeConnection = null;
            }
        }
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            if (!activeConnection || !isConnected) {
                addSystemMessage('❌ Нет подключения!');
                return;
            }
            try {
                activeConnection.send({ type: 'message', text: text, time: Date.now() });
                addMessage(text, true);
                messageInput.value = '';
            } catch(e) {
                addSystemMessage(`❌ Ошибка: ${e.message}`);
            }
        }
        
        function setupConnection(conn, isIncoming = false) {
            activeConnection = conn;
            conn.on('open', () => updateStatus(true, conn.peer));
            conn.on('data', (data) => { if (data.type === 'message') addMessage(data.text, false); });
            conn.on('close', () => updateStatus(false));
            conn.on('error', (err) => { 
                console.log(err);
                updateStatus(false);
            });
            if (isIncoming && conn.open) updateStatus(true, conn.peer);
        }
        
        function connectToPeer(peerId) {
            if (!peer) { addSystemMessage('❌ Ошибка'); return; }
            if (activeConnection) { addSystemMessage('⚠️ Сначала отключитесь'); return; }
            addSystemMessage(`🔄 Подключение к ${peerId}...`);
            const conn = peer.connect(peerId);
            setupConnection(conn);
        }
        
        function disconnect() {
            if (activeConnection) {
                activeConnection.close();
                updateStatus(false);
            }
        }
        
        function copyMyId() {
            const id = myPeerIdSpan.textContent;
            if (id && id !== 'Загрузка...') {
                navigator.clipboard.writeText(id);
                addSystemMessage('📋 ID скопирован!');
            }
        }
        
        function initPeer() {
            const randomId = 'az_' + Math.random().toString(36).substring(2, 10);
            
            // Используем другой сервер PeerJS
            peer = new Peer(randomId, {
                host: '0.peerjs.com',
                port: 443,
                path: '/',
                secure: true,
                config: { 
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ] 
                }
            });
            
            peer.on('open', (id) => {
                myPeerIdSpan.textContent = id;
                statusText.innerHTML = `🟡 Не подключено | ID: ${id.substring(0, 12)}...`;
                addSystemMessage(`✅ DirectAZ готов! Ваш ID: ${id}`);
                reconnectAttempts = 0;
            });
            
            peer.on('connection', (conn) => {
                addSystemMessage(`📞 Входящее от ${conn.peer.substring(0, 8)}...`);
                if (activeConnection) { 
                    conn.close(); 
                    return; 
                }
                setupConnection(conn, true);
            });
            
            peer.on('error', (err) => {
                console.error('Peer error:', err);
                if (err.type === 'peer-unavailable') {
                    addSystemMessage(`❌ Собеседник не найден`);
                } else if (err.type === 'network') {
                    addSystemMessage(`⚠️ Проблема с сетью, переподключение...`);
                    setTimeout(() => {
                        if (peer) peer.reconnect();
                    }, 2000);
                } else {
                    addSystemMessage(`❌ Ошибка: ${err.message || err.type}`);
                }
            });
            
            peer.on('disconnected', () => {
                addSystemMessage(`⚠️ Соединение потеряно, переподключаемся...`);
                peer.reconnect();
            });
        }
        
        document.getElementById('connectBtn').onclick = () => {
            const targetId = document.getElementById('peerIdInput').value.trim();
            if (!targetId) { addSystemMessage('⚠️ Введите ID'); return; }
            if (targetId === myPeerIdSpan.textContent) { addSystemMessage('⚠️ Нельзя к себе'); return; }
            connectToPeer(targetId);
        };
        document.getElementById('disconnectBtn').onclick = disconnect;
        document.getElementById('sendBtn').onclick = sendMessage;
        
        initPeer();
    </script>
</body>
</html>
