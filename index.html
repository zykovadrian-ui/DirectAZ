<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат - рабочий</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #0f172a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat {
            max-width: 500px;
            width: 100%;
            height: 95vh;
            background: white;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header { background: #3b82f6; color: white; padding: 20px; text-align: center; }
        .my-code { background: #f1f5f9; padding: 15px; margin: 15px; border-radius: 16px; text-align: center; }
        .code { font-size: 28px; font-weight: bold; font-family: monospace; background: white; padding: 12px; border-radius: 12px; margin: 10px 0; cursor: pointer; }
        .connect { padding: 15px; background: #f8fafc; margin: 0 15px 15px; border-radius: 16px; }
        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; text-align: center; font-size: 18px; }
        button { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .friends { flex: 1; overflow-y: auto; padding: 0 15px; }
        .friend { background: #f1f5f9; padding: 15px; margin-bottom: 10px; border-radius: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .online { color: #22c55e; font-size: 12px; }
        .chat-window { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #f8fafc; display: none; flex-direction: column; }
        .chat-header { background: white; padding: 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #e2e8f0; }
        .back { background: none; border: none; font-size: 24px; cursor: pointer; }
        .msgs { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { margin-bottom: 10px; padding: 10px 14px; border-radius: 18px; max-width: 75%; }
        .msg.me { background: #3b82f6; color: white; margin-left: auto; }
        .msg.other { background: white; border: 1px solid #e2e8f0; }
        .bottom { padding: 12px; background: white; display: flex; gap: 10px; border-top: 1px solid #e2e8f0; }
        .bottom input { flex: 1; padding: 12px; border-radius: 25px; }
        .status { padding: 8px; text-align: center; font-size: 12px; background: #f1f5f9; }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
<div class="chat">
    <div class="header"><h2>💬 Чат</h2></div>
    <div class="my-code">
        <div style="color:#64748b">🔑 Ваш код</div>
        <div class="code" id="myCode" onclick="copyCode()">...</div>
    </div>
    <div class="connect">
        <div>🔗 Введите код друга</div>
        <div class="input-group">
            <input type="text" id="friendCode" placeholder="например кот">
            <button id="connectBtn">Подключиться</button>
        </div>
    </div>
    <div class="friends" id="friendsList"></div>
    <div class="status" id="status">🟡 Готов</div>
    <div id="chatWindow" class="chat-window">
        <div class="chat-header">
            <button class="back" onclick="closeChat()">←</button>
            <div><div id="chatName" style="font-weight:600"></div><div id="chatOnline" style="font-size:11px"></div></div>
        </div>
        <div class="msgs" id="msgs"></div>
        <div class="bottom">
            <input type="text" id="msgInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">📤</button>
        </div>
    </div>
</div>
<script>
    let peer, myCode, currentFriend = null, activeConn = null;
    let friends = {};
    let allMessages = JSON.parse(localStorage.getItem('chat_msgs') || '{}');
    
    const words = ['кот', 'лис', 'сон', 'чай', 'луна', 'дом', 'лес', 'море', 'друг', 'мир'];
    myCode = localStorage.getItem('my_code') || (() => {
        let c = words[Math.floor(Math.random() * words.length)] + Math.floor(Math.random() * 100);
        localStorage.setItem('my_code', c);
        return c;
    })();
    document.getElementById('myCode').innerText = myCode;
    
    function copyCode() { navigator.clipboard.writeText(myCode); alert('Код: ' + myCode); }
    
    // ПОДКЛЮЧАЕМСЯ К ДРУГОМУ СЕРВЕРУ
    peer = new Peer(myCode, {
        host: '0.peerjs.com',
        port: 443,
        secure: true,
        debug: 0
    });
    
    peer.on('open', () => { document.getElementById('status').innerHTML = '🟢 Ваш код: ' + myCode; });
    
    peer.on('connection', (conn) => {
        friends[conn.peer] = { conn, online: true };
        conn.on('data', (d) => { if (d.type === 'msg') { saveMsg(conn.peer, d.text, false); if (currentFriend === conn.peer) renderMsgs(); } });
        conn.on('close', () => { if (friends[conn.peer]) friends[conn.peer].online = false; renderFriends(); });
        renderFriends();
    });
    
    peer.on('error', (err) => { console.log(err); document.getElementById('status').innerHTML = '🔴 Ошибка: ' + err.type; });
    
    function connectTo(code) {
        if (code === myCode) { alert('Нельзя к себе'); return; }
        document.getElementById('status').innerHTML = '🟡 Подключение...';
        let conn = peer.connect(code);
        conn.on('open', () => {
            friends[code] = { conn, online: true };
            renderFriends();
            document.getElementById('status').innerHTML = '🟢 Подключено к ' + code;
            openChat(code);
        });
        conn.on('error', () => { document.getElementById('status').innerHTML = '🔴 Не удалось'; });
    }
    
    function saveMsg(code, text, fromMe) {
        if (!allMessages[code]) allMessages[code] = [];
        allMessages[code].push({ text, fromMe, time: Date.now() });
        localStorage.setItem('chat_msgs', JSON.stringify(allMessages));
    }
    
    function sendMsg() {
        let inp = document.getElementById('msgInput');
        let text = inp.value.trim();
        if (!text || !currentFriend) return;
        let f = friends[currentFriend];
        if (!f || !f.conn) { alert('Не в сети'); return; }
        f.conn.send({ type: 'msg', text });
        saveMsg(currentFriend, text, true);
        renderMsgs();
        inp.value = '';
    }
    
    function renderFriends() {
        let container = document.getElementById('friendsList');
        let list = Object.keys(friends).filter(k => friends[k].online);
        if (list.length === 0) { container.innerHTML = '<div style="text-align:center;padding:20px;color:#94a3b8">🤝 Никого нет<br><small>Скажите код: ' + myCode + '</small></div>'; return; }
        container.innerHTML = list.map(code => `<div class="friend" onclick="openChat('${code}')"><div><div style="font-weight:600">${code}</div><div class="online">🟢 Онлайн</div></div><button onclick="event.stopPropagation();openChat('${code}')" style="background:#3b82f6;padding:8px 12px;">💬</button></div>`).join('');
    }
    
    function openChat(code) { currentFriend = code; document.getElementById('chatName').innerHTML = code; document.getElementById('chatOnline').innerHTML = '🟢 Онлайн'; document.getElementById('chatWindow').style.display = 'flex'; renderMsgs(); }
    function closeChat() { currentFriend = null; document.getElementById('chatWindow').style.display = 'none'; renderFriends(); }
    function renderMsgs() { let c = document.getElementById('msgs'); if (!currentFriend || !allMessages[currentFriend]) { c.innerHTML = '<div style="text-align:center;padding:40px">💬 Нет сообщений</div>'; return; } c.innerHTML = allMessages[currentFriend].map(m => `<div class="msg ${m.fromMe ? 'me' : 'other'}">${escapeHtml(m.text)}</div>`).join(''); c.scrollTop = c.scrollHeight; }
    function escapeHtml(t) { let d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    
    document.getElementById('connectBtn').onclick = () => { let code = document.getElementById('friendCode').value.trim().toLowerCase(); if (code) connectTo(code); };
    renderFriends();
</script>
</body>
</html>
