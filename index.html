<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автономный чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat {
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 700px;
            background: white;
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .header {
            background: #3b82f6;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .id-box {
            background: #e2e8f0;
            padding: 15px;
            text-align: center;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .connect-box {
            padding: 15px;
            background: #f8fafc;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #e2e8f0;
        }
        .connect-box input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f1f5f9;
        }
        .msg {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 75%;
            word-wrap: break-word;
        }
        .msg.sent {
            background: #3b82f6;
            color: white;
            margin-left: auto;
        }
        .msg.received {
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
        }
        .input-area {
            padding: 15px;
            background: white;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e2e8f0;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 25px;
            font-size: 16px;
        }
        .status {
            font-size: 12px;
            padding: 5px 15px;
            text-align: center;
            background: #f1f5f9;
        }
        .info {
            background: #fef3c7;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            border-bottom: 1px solid #fde68a;
        }
    </style>
</head>
<body>
<div class="chat">
    <div class="header">
        <strong>💬 Простой чат</strong>
    </div>
    <div class="info">
        📌 Работает через одноранговую сеть (WebRTC)<br>
        🔗 Нужен только интернет для первого подключения
    </div>
    <div class="id-box" onclick="copyId()">
        📋 Ваш ID: <span id="myId">создаю...</span>
    </div>
    <div class="connect-box">
        <input type="text" id="friendId" placeholder="Введите ID друга">
        <button id="connectBtn">Подключиться</button>
    </div>
    <div class="status" id="status">⚪ Не подключено</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
        <button id="sendBtn">📤</button>
    </div>
</div>

<script>
    // Простой WebRTC без внешних библиотек
    let localConnection, remoteConnection, sendChannel, receiveChannel;
    let myId, targetId;
    let connected = false;
    
    const messagesDiv = document.getElementById('messages');
    const statusDiv = document.getElementById('status');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const myIdSpan = document.getElementById('myId');
    const friendIdInput = document.getElementById('friendId');
    
    sendBtn.disabled = true;
    msgInput.disabled = true;
    
    function addMsg(text, isMe) {
        const div = document.createElement('div');
        div.className = 'msg ' + (isMe ? 'sent' : 'received');
        div.textContent = text;
        messagesDiv.appendChild(div);
        div.scrollIntoView();
    }
    
    function copyId() {
        if (myId) {
            navigator.clipboard.writeText(myId);
            alert('ID скопирован: ' + myId);
        }
    }
    
    // Генерируем простой ID
    function generateId() {
        const saved = localStorage.getItem('myChatId');
        if (saved) return saved;
        
        // Короткий читаемый ID
        const adjectives = ['кот', 'лис', 'сон', 'чай', 'лун', 'звезд', 'быст', 'тих', 'мяу', 'гав'];
        const nouns = ['кит', 'лес', 'море', 'дом', 'путь', 'сон', 'друг', 'мир', 'свет', 'тепло'];
        const num = Math.floor(Math.random() * 100);
        const id = adjectives[Math.floor(Math.random() * adjectives.length)] + 
                   nouns[Math.floor(Math.random() * nouns.length)] + num;
        
        localStorage.setItem('myChatId', id);
        return id;
    }
    
    myId = generateId();
    myIdSpan.textContent = myId;
    statusDiv.innerHTML = '🟡 Ваш ID: ' + myId + ' (нажми чтобы скопировать)';
    
    // Создаём соединение
    function createConnection(isInitiator, targetIdForConnection) {
        targetId = targetIdForConnection;
        
        const config = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };
        
        if (isInitiator) {
            // Инициатор создаёт соединение
            localConnection = new RTCPeerConnection(config);
            sendChannel = localConnection.createDataChannel('chat');
            
            sendChannel.onopen = () => {
                connected = true;
                statusDiv.innerHTML = '🟢 Подключено к ' + targetId;
                sendBtn.disabled = false;
                msgInput.disabled = false;
                addMsg('✅ Соединение установлено!', false);
            };
            
            sendChannel.onclose = () => {
                connected = false;
                statusDiv.innerHTML = '⚪ Соединение разорвано';
                sendBtn.disabled = true;
                msgInput.disabled = true;
            };
            
            sendChannel.onmessage = (event) => {
                addMsg(event.data, false);
            };
            
            localConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    // Отправляем кандидата через prompt (временное решение)
                    console.log('Candidate:', event.candidate);
                }
            };
            
            // Создаём offer
            localConnection.createOffer()
                .then(offer => localConnection.setLocalDescription(offer))
                .then(() => {
                    // Показываем offer для отправки другу
                    const offer = JSON.stringify(localConnection.localDescription);
                    prompt('Скопируйте этот код и отправьте другу:', offer);
                });
        } else {
            // Принимающая сторона
            remoteConnection = new RTCPeerConnection(config);
            
            remoteConnection.ondatachannel = (event) => {
                receiveChannel = event.channel;
                receiveChannel.onopen = () => {
                    connected = true;
                    statusDiv.innerHTML = '🟢 Подключено к ' + targetId;
                    sendBtn.disabled = false;
                    msgInput.disabled = false;
                    addMsg('✅ Соединение установлено!', false);
                };
                receiveChannel.onclose = () => {
                    connected = false;
                    statusDiv.innerHTML = '⚪ Соединение разорвано';
                    sendBtn.disabled = true;
                    msgInput.disabled = true;
                };
                receiveChannel.onmessage = (event) => {
                    addMsg(event.data, false);
                };
                sendChannel = receiveChannel;
            };
            
            remoteConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log('Candidate:', event.candidate);
                }
            };
        }
    }
    
    // Отправка сообщения
    function send() {
        const text = msgInput.value.trim();
        if (!text || !connected || !sendChannel) return;
        sendChannel.send(text);
        addMsg(text, true);
        msgInput.value = '';
    }
    
    // Подключение через ручной обмен SDP
    document.getElementById('connectBtn').onclick = () => {
        const friendIdInput = document.getElementById('friendId').value.trim();
        if (!friendIdInput) {
            alert('Введите ID друга');
            return;
        }
        
        // Простой способ: отправляем offer через буфер обмена
        const isInitiator = confirm('Вы первый подключаетесь? "OK" - да, "Отмена" - принимаю подключение');
        
        if (isInitiator) {
            createConnection(true, friendIdInput);
        } else {
            // Принимаем offer от друга
            const offerStr = prompt('Вставьте код подключения от друга:');
            if (offerStr) {
                try {
                    const offer = JSON.parse(offerStr);
                    remoteConnection = new RTCPeerConnection({
                        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                    });
                    
                    remoteConnection.ondatachannel = (event) => {
                        receiveChannel = event.channel;
                        receiveChannel.onopen = () => {
                            connected = true;
                            statusDiv.innerHTML = '🟢 Подключено к ' + friendIdInput;
                            sendBtn.disabled = false;
                            msgInput.disabled = false;
                            addMsg('✅ Соединение установлено!', false);
                        };
                        receiveChannel.onclose = () => {
                            connected = false;
                            statusDiv.innerHTML = '⚪ Соединение разорвано';
                            sendBtn.disabled = true;
                            msgInput.disabled = true;
                        };
                        receiveChannel.onmessage = (event) => {
                            addMsg(event.data, false);
                        };
                        sendChannel = receiveChannel;
                    };
                    
                    remoteConnection.setRemoteDescription(offer)
                        .then(() => remoteConnection.createAnswer())
                        .then(answer => remoteConnection.setLocalDescription(answer))
                        .then(() => {
                            const answer = JSON.stringify(remoteConnection.localDescription);
                            prompt('Отправьте этот код другу:', answer);
                        });
                } catch(e) {
                    alert('Ошибка: неверный код');
                }
            }
        }
    };
    
    sendBtn.onclick = send;
    
    // Добавляем сообщение о работе
    setTimeout(() => {
        addMsg('✨ Ваш ID: ' + myId, false);
        addMsg('💡 Отправьте этот ID другу любым способом', false);
        addMsg('📱 Друг вводит ваш ID и нажимает "Подключиться"', false);
    }, 1000);
</script>
</body>
</html>
