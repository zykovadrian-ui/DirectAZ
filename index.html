<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>РусЧат — Мессенджер на русских кодах</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .app {
            max-width: 500px;
            width: 100%;
            height: 95vh;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .my-code-card {
            background: #f1f5f9;
            margin: 15px;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
        }
        .my-code {
            font-size: 32px;
            font-weight: bold;
            font-family: monospace;
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
            letter-spacing: 4px;
            cursor: pointer;
        }
        .connect-section {
            padding: 15px;
            background: #f8fafc;
            margin: 0 15px 15px;
            border-radius: 20px;
        }
        .connect-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .connect-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            font-size: 18px;
            text-align: center;
        }
        button {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .friends-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px;
        }
        .friend-item {
            background: #f1f5f9;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .status-online {
            color: #22c55e;
            font-size: 12px;
        }
        .status-offline {
            color: #94a3b8;
            font-size: 12px;
        }
        .chat-window {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #f8fafc;
            display: none;
            flex-direction: column;
            z-index: 10;
        }
        .chat-header {
            background: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .msg {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 75%;
            word-wrap: break-word;
        }
        .msg.sent {
            background: #3b82f6;
            color: white;
            margin-left: auto;
        }
        .msg.received {
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
        }
        .input-area {
            padding: 12px;
            background: white;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e2e8f0;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 25px;
            font-size: 14px;
        }
        .status-bar {
            padding: 8px;
            text-align: center;
            font-size: 12px;
            background: #f1f5f9;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>🇷🇺 РусЧат</h1>
        <div style="font-size: 12px;">Мессенджер на русских кодах</div>
    </div>

    <div class="my-code-card">
        <div style="color: #64748b;">🔑 Ваш русский код</div>
        <div class="my-code" id="myCode" onclick="copyCode()">загрузка...</div>
        <div style="font-size: 12px; color: #64748b;">👆 Нажмите чтобы скопировать</div>
    </div>

    <div class="connect-section">
        <div>🔗 Подключиться к другу</div>
        <div class="connect-input">
            <input type="text" id="friendCode" placeholder="Например: сова" style="text-transform: lowercase;">
            <button id="connectBtn">Подключиться</button>
        </div>
    </div>

    <div class="friends-list" id="friendsList">
        <div style="text-align: center; padding: 20px; color: #94a3b8;">
            🤝 Здесь появятся друзья<br>
            <small>Скажите друг другу коды</small>
        </div>
    </div>

    <div class="status-bar" id="statusBar">
        🟡 Готов к общению
    </div>

    <!-- Окно чата -->
    <div id="chatWindow" class="chat-window">
        <div class="chat-header">
            <button class="back-btn" onclick="closeChat()">←</button>
            <div>
                <div id="chatName" style="font-weight: 600;"></div>
                <div id="chatStatus" style="font-size: 11px;"></div>
            </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">📤</button>
        </div>
    </div>
</div>

<script>
    // ========== РУССКИЕ СЛОВА ДЛЯ КОДОВ ==========
    const русскиеСлова = [
        'сова', 'волк', 'лиса', 'ёж', 'медведь', 'заяц', 'белка', 'лось',
        'ромашка', 'берёза', 'дуб', 'клён', 'ива', 'сирень', 'пион',
        'снег', 'дождь', 'гроза', 'радуга', 'звезда', 'луна', 'солнце',
        'кот', 'пёс', 'хомяк', 'попугай', 'рыба', 'кит', 'орёл',
        'чай', 'кофе', 'молоко', 'мёд', 'хлеб', 'пирог', 'торт'
    ];
    
    // ========== ПЕРЕМЕННЫЕ ==========
    let peer;
    let myCode;
    let connections = {};
    let messages = JSON.parse(localStorage.getItem('ruschat_messages') || '{}');
    let currentChatCode = null;
    
    // ========== ГЕНЕРАЦИЯ РУССКОГО КОДА ==========
    function generateRussianCode() {
        // Пытаемся получить сохранённый
        let saved = localStorage.getItem('ruschat_code');
        if (saved && русскиеСлова.includes(saved)) {
            return saved;
        }
        // Или создаём новый
        const randomWord = русскиеСлова[Math.floor(Math.random() * русскиеСлова.length)];
        localStorage.setItem('ruschat_code', randomWord);
        return randomWord;
    }
    
    myCode = generateRussianCode();
    document.getElementById('myCode').textContent = myCode;
    
    // ========== ИНИЦИАЛИЗАЦИЯ PEER ==========
    function initPeer() {
        peer = new Peer(myCode, {
            debug: 0,
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });
        
        peer.on('open', (id) => {
            console.log('Peer открыт:', id);
            document.getElementById('statusBar').innerHTML = '🟢 Ваш код: ' + id + ' — скажите другу';
        });
        
        peer.on('connection', (conn) => {
            console.log('Входящее от:', conn.peer);
            addConnection(conn);
        });
        
        peer.on('error', (err) => {
            console.error(err);
            if (err.type === 'peer-unavailable') {
                document.getElementById('statusBar').innerHTML = '🔴 Друг не найден. Проверьте код';
                setTimeout(() => {
                    document.getElementById('statusBar').innerHTML = '🟢 Готов к общению';
                }, 2000);
            }
        });
    }
    
    function addConnection(conn) {
        const code = conn.peer;
        
        connections[code] = {
            conn: conn,
            online: true,
            name: code
        };
        
        conn.on('data', (data) => {
            if (data.type === 'message') {
                saveMessage(code, data.text, false);
                if (currentChatCode === code) {
                    renderMessages();
                }
                renderFriendsList();
            }
        });
        
        conn.on('close', () => {
            if (connections[code]) {
                connections[code].online = false;
                renderFriendsList();
                if (currentChatCode === code) {
                    document.getElementById('chatStatus').innerHTML = '⚫ Офлайн';
                }
            }
        });
        
        renderFriendsList();
    }
    
    function connectTo(code) {
        if (code === myCode) {
            alert('Нельзя подключиться к себе');
            return;
        }
        
        if (connections[code]) {
            openChat(code);
            return;
        }
        
        document.getElementById('statusBar').innerHTML = '🟡 Подключение к ' + code + '...';
        
        const conn = peer.connect(code);
        
        conn.on('open', () => {
            addConnection(conn);
            document.getElementById('statusBar').innerHTML = '🟢 Подключено к ' + code;
            openChat(code);
        });
        
        conn.on('error', () => {
            document.getElementById('statusBar').innerHTML = '🔴 ' + code + ' не в сети';
            setTimeout(() => {
                document.getElementById('statusBar').innerHTML = '🟢 Готов к общению';
            }, 2000);
        });
        
        setTimeout(() => {
            if (!connections[code]) {
                document.getElementById('statusBar').innerHTML = '🔴 Друг не в сети. Проверьте код: ' + code;
            }
        }, 3000);
    }
    
    // ========== ОТПРАВКА СООБЩЕНИЙ ==========
    function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !currentChatCode) return;
        
        const conn = connections[currentChatCode]?.conn;
        if (conn && conn.open) {
            conn.send({ type: 'message', text: text });
            saveMessage(currentChatCode, text, true);
            renderMessages();
            input.value = '';
        } else {
            alert('Друг не в сети');
        }
    }
    
    function saveMessage(code, text, isSent) {
        if (!messages[code]) messages[code] = [];
        messages[code].push({ text, isSent, time: Date.now() });
        if (messages[code].length > 50) messages[code] = messages[code].slice(-50);
        localStorage.setItem('ruschat_messages', JSON.stringify(messages));
    }
    
    // ========== UI ==========
    function renderFriendsList() {
        const container = document.getElementById('friendsList');
        const onlineFriends = Object.keys(connections).filter(code => connections[code].online);
        
        if (onlineFriends.length === 0) {
            container.innerHTML = `
                <div style="text-align: center; padding: 20px; color: #94a3b8;">
                    🤝 Никого нет в сети<br>
                    <small>Скажите другу ваш код: <strong style="font-size: 18px;">${myCode}</strong></small>
                </div>
            `;
            return;
        }
        
        container.innerHTML = onlineFriends.map(code => `
            <div class="friend-item" onclick="openChat('${code}')">
                <div style="width: 45px; height: 45px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px;">👤</div>
                <div style="flex: 1;">
                    <div style="font-weight: 600;">${code}</div>
                    <div class="status-online">🟢 Онлайн</div>
                </div>
                <button onclick="event.stopPropagation(); openChat('${code}')" style="background: none; color: #3b82f6; padding: 5px 10px;">💬</button>
            </div>
        `).join('');
    }
    
    function openChat(code) {
        currentChatCode = code;
        document.getElementById('chatName').innerHTML = code;
        document.getElementById('chatStatus').innerHTML = connections[code]?.online ? '🟢 Онлайн' : '⚫ Офлайн';
        document.getElementById('chatWindow').style.display = 'flex';
        renderMessages();
    }
    
    function closeChat() {
        currentChatCode = null;
        document.getElementById('chatWindow').style.display = 'none';
        renderFriendsList();
    }
    
    function renderMessages() {
        const container = document.getElementById('messages');
        if (!currentChatCode || !messages[currentChatCode] || messages[currentChatCode].length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 40px; color: #94a3b8;">💬 Напишите первое сообщение</div>';
            return;
        }
        
        container.innerHTML = messages[currentChatCode].map(msg => `
            <div class="msg ${msg.isSent ? 'sent' : 'received'}">
                ${msg.text}
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function copyCode() {
        navigator.clipboard.writeText(myCode);
        alert('Код скопирован: ' + myCode);
    }
    
    // ========== ЗАПУСК ==========
    initPeer();
    
    document.getElementById('connectBtn').onclick = () => {
        let code = document.getElementById('friendCode').value.trim().toLowerCase();
        if (code) connectTo(code);
    };
    
    // Периодическая очистка офлайн друзей
    setInterval(() => {
        let changed = false;
        Object.keys(connections).forEach(code => {
            if (!connections[code].online && connections[code].conn && !connections[code].conn.open) {
                delete connections[code];
                changed = true;
            }
        });
        if (changed) renderFriendsList();
    }, 30000);
</script>
</body>
</html>
