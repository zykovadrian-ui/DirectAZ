<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат по коду</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #0f172a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }
        .top {
            background: #3b82f6;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .code-block {
            background: #f1f5f9;
            padding: 15px;
            margin: 15px;
            border-radius: 16px;
            text-align: center;
        }
        .code {
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            background: white;
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
            cursor: pointer;
        }
        .connect-block {
            padding: 15px;
            background: #f8fafc;
            margin: 0 15px 15px;
            border-radius: 16px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .friends {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px;
        }
        .friend {
            background: #f1f5f9;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .online {
            color: #22c55e;
            font-size: 12px;
        }
        .chat-area {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #f8fafc;
            display: none;
            flex-direction: column;
        }
        .chat-header {
            background: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        .back {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .msgs {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .msg {
            margin-bottom: 10px;
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 75%;
        }
        .msg.me {
            background: #3b82f6;
            color: white;
            margin-left: auto;
        }
        .msg.other {
            background: white;
            border: 1px solid #e2e8f0;
        }
        .bottom {
            padding: 12px;
            background: white;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e2e8f0;
        }
        .bottom input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
        }
        .status {
            padding: 8px;
            text-align: center;
            font-size: 12px;
            background: #f1f5f9;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
<div class="container" id="app">
    <div class="top">
        <h2>💬 Чат по коду</h2>
    </div>

    <div class="code-block">
        <div style="color:#64748b">🔑 Ваш код</div>
        <div class="code" id="myCode">...</div>
        <div style="font-size:12px; color:#64748b">👆 нажмите чтобы скопировать</div>
    </div>

    <div class="connect-block">
        <div>🔗 Введите код друга</div>
        <div class="input-group">
            <input type="text" id="friendCodeInput" placeholder="например кот" style="text-transform:lowercase">
            <button id="connectBtn">Подключиться</button>
        </div>
    </div>

    <div class="friends" id="friendsList">
        <div style="text-align:center; padding:20px; color:#94a3b8">
            🤝 Здесь появится друг<br>
            <small>скажите ему свой код</small>
        </div>
    </div>

    <div class="status" id="statusMsg">🟡 Готов</div>

    <div id="chatWindow" class="chat-area">
        <div class="chat-header">
            <button class="back" onclick="closeChat()">←</button>
            <div>
                <div id="chatFriendName" style="font-weight:600"></div>
                <div id="chatFriendOnline" style="font-size:11px"></div>
            </div>
        </div>
        <div class="msgs" id="msgs"></div>
        <div class="bottom">
            <input type="text" id="msgInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">📤</button>
        </div>
    </div>
</div>

<script>
    let peer;
    let myCode;
    let currentFriend = null;
    let activeConn = null;
    let friends = {};  // код -> {conn, online}
    let allMessages = JSON.parse(localStorage.getItem('chat_msgs') || '{}');
    
    // Генерация кода (русское слово + цифра)
    const words = ['кот', 'лис', 'сон', 'чай', 'луна', 'дом', 'лес', 'море', 'друг', 'мир'];
    function makeCode() {
        let saved = localStorage.getItem('my_code');
        if (saved) return saved;
        let word = words[Math.floor(Math.random() * words.length)];
        let num = Math.floor(Math.random() * 100);
        let code = word + num;
        localStorage.setItem('my_code', code);
        return code;
    }
    
    myCode = makeCode();
    document.getElementById('myCode').innerText = myCode;
    
    function copyCode() {
        navigator.clipboard.writeText(myCode);
        alert('Код скопирован: ' + myCode);
    }
    document.getElementById('myCode').onclick = copyCode;
    
    // Инициализация Peer
    function initPeer() {
        peer = new Peer(myCode, {
            debug: 0,
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });
        
        peer.on('open', () => {
            document.getElementById('statusMsg').innerHTML = '🟢 Ваш код: ' + myCode;
        });
        
        peer.on('connection', (conn) => {
            console.log('Подключение от:', conn.peer);
            addFriend(conn);
        });
        
        peer.on('error', (err) => {
            if (err.type === 'peer-unavailable') {
                document.getElementById('statusMsg').innerHTML = '🔴 Такого кода нет';
                setTimeout(() => {
                    document.getElementById('statusMsg').innerHTML = '🟢 Готов';
                }, 2000);
            }
        });
    }
    
    function addFriend(conn) {
        let code = conn.peer;
        friends[code] = { conn: conn, online: true };
        
        conn.on('data', (data) => {
            if (data.type === 'msg') {
                if (!allMessages[code]) allMessages[code] = [];
                allMessages[code].push({ text: data.text, fromMe: false, time: Date.now() });
                localStorage.setItem('chat_msgs', JSON.stringify(allMessages));
                if (currentFriend === code) renderMsgs();
            }
        });
        
        conn.on('close', () => {
            if (friends[code]) friends[code].online = false;
            renderFriends();
            if (currentFriend === code) {
                document.getElementById('chatFriendOnline').innerHTML = '⚫ Офлайн';
            }
        });
        
        renderFriends();
    }
    
    function connectTo(code) {
        if (code === myCode) {
            alert('Нельзя к себе');
            return;
        }
        if (friends[code] && friends[code].online) {
            openChat(code);
            return;
        }
        
        document.getElementById('statusMsg').innerHTML = '🟡 Подключение к ' + code + '...';
        let conn = peer.connect(code);
        
        conn.on('open', () => {
            addFriend(conn);
            document.getElementById('statusMsg').innerHTML = '🟢 Подключено к ' + code;
            openChat(code);
        });
        
        conn.on('error', () => {
            document.getElementById('statusMsg').innerHTML = '🔴 Не удалось подключиться к ' + code;
            setTimeout(() => {
                document.getElementById('statusMsg').innerHTML = '🟢 Готов';
            }, 2000);
        });
        
        setTimeout(() => {
            if (!friends[code] || !friends[code].online) {
                document.getElementById('statusMsg').innerHTML = '🔴 ' + code + ' не в сети. Откройте страницу оба.';
            }
        }, 3000);
    }
    
    function sendMsg() {
        let input = document.getElementById('msgInput');
        let text = input.value.trim();
        if (!text || !currentFriend) return;
        let f = friends[currentFriend];
        if (!f || !f.conn || !f.online) {
            alert('Друг не в сети');
            return;
        }
        f.conn.send({ type: 'msg', text: text });
        if (!allMessages[currentFriend]) allMessages[currentFriend] = [];
        allMessages[currentFriend].push({ text: text, fromMe: true, time: Date.now() });
        localStorage.setItem('chat_msgs', JSON.stringify(allMessages));
        renderMsgs();
        input.value = '';
    }
    
    function renderFriends() {
        let container = document.getElementById('friendsList');
        let onlineList = Object.keys(friends).filter(code => friends[code].online);
        
        if (onlineList.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:20px; color:#94a3b8">
                🤝 Никого нет в сети<br>
                <small>Скажите другу ваш код: <strong>${myCode}</strong></small>
            </div>`;
            return;
        }
        
        container.innerHTML = onlineList.map(code => `
            <div class="friend" onclick="openChat('${code}')">
                <div>
                    <div style="font-weight:600">${code}</div>
                    <div class="online">🟢 Онлайн</div>
                </div>
                <button onclick="event.stopPropagation(); openChat('${code}')" style="background:#3b82f6; padding:8px 12px;">💬</button>
            </div>
        `).join('');
    }
    
    function openChat(code) {
        currentFriend = code;
        document.getElementById('chatFriendName').innerHTML = code;
        document.getElementById('chatFriendOnline').innerHTML = friends[code]?.online ? '🟢 Онлайн' : '⚫ Офлайн';
        document.getElementById('chatWindow').style.display = 'flex';
        renderMsgs();
    }
    
    function closeChat() {
        currentFriend = null;
        document.getElementById('chatWindow').style.display = 'none';
        renderFriends();
    }
    
    function renderMsgs() {
        let container = document.getElementById('msgs');
        if (!currentFriend || !allMessages[currentFriend] || allMessages[currentFriend].length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px; color:#94a3b8">💬 Напишите первое сообщение</div>';
            return;
        }
        container.innerHTML = allMessages[currentFriend].map(m => `
            <div class="msg ${m.fromMe ? 'me' : 'other'}">
                ${escapeHtml(m.text)}
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function escapeHtml(t) {
        let div = document.createElement('div');
        div.textContent = t;
        return div.innerHTML;
    }
    
    // Запуск
    initPeer();
    document.getElementById('connectBtn').onclick = () => {
        let code = document.getElementById('friendCodeInput').value.trim().toLowerCase();
        if (code) connectTo(code);
    };
    
    renderFriends();
</script>
</body>
</html>
