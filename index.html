<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>P2P Мессенджер - Живая переписка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 85vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #4a5568;
            color: white;
            padding: 15px 20px;
            text-align: center;
        }
        .header h1 { font-size: 1.3em; margin-bottom: 5px; }
        .status {
            font-size: 0.85em;
            opacity: 0.9;
        }
        .connection-panel {
            background: #f7f9fc;
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
        }
        .peer-id-box {
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e0;
            margin-bottom: 10px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
        }
        .connect-area {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.1s;
        }
        button:hover { background: #5a67d8; transform: scale(0.98); }
        button:active { transform: scale(0.95); }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        .message.sent { align-items: flex-end; }
        .message.received { align-items: flex-start; }
        .bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        .sent .bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 5px;
        }
        .received .bubble {
            background: white;
            color: #2d3748;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 5px;
        }
        .time {
            font-size: 11px;
            color: #a0aec0;
            margin-top: 4px;
            padding: 0 5px;
        }
        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 25px;
            font-size: 14px;
        }
        .system-message {
            text-align: center;
            color: #718096;
            font-size: 12px;
            margin: 10px 0;
        }
        .online {
            color: #48bb78;
            font-weight: bold;
        }
        .offline {
            color: #fc8181;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>💬 P2P Мессенджер</h1>
            <div class="status" id="statusText">Инициализация...</div>
        </div>
        
        <div class="connection-panel">
            <div class="peer-id-box">
                🔑 <strong>Ваш ID для подключения:</strong><br>
                <span id="myPeerId">Загрузка...</span>
            </div>
            <div class="connect-area">
                <input type="text" id="peerIdInput" placeholder="Введите ID собеседника">
                <button id="connectBtn">🔗 Подключиться</button>
                <button id="disconnectBtn" style="background:#fc8181">❌ Отключить</button>
            </div>
        </div>
        
        <div class="messages-area" id="messagesArea">
            <div class="system-message">✨ Готов к общению! Отправьте свой ID другу или подключитесь к нему.</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="sendBtn">📤 Отправить</button>
        </div>
    </div>

    <script>
        // Инициализация
        let peer = null;
        let activeConnection = null;
        let isConnected = false;
        
        // Получаем элементы
        const messagesArea = document.getElementById('messagesArea');
        const myPeerIdSpan = document.getElementById('myPeerId');
        const statusText = document.getElementById('statusText');
        const messageInput = document.getElementById('messageInput');
        
        // Функция добавления сообщения
        function addMessage(text, isSent, isSystem = false) {
            const messageDiv = document.createElement('div');
            
            if (isSystem) {
                messageDiv.className = 'system-message';
                messageDiv.innerHTML = text;
            } else {
                messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
                const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                messageDiv.innerHTML = `
                    <div class="bubble">${escapeHtml(text)}</div>
                    <div class="time">${time}</div>
                `;
            }
            
            messagesArea.appendChild(messageDiv);
            messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function addSystemMessage(text) {
            addMessage(text, false, true);
        }
        
        function updateStatus(connected, peerId = null) {
            isConnected = connected;
            if (connected && peerId) {
                statusText.innerHTML = `🟢 Подключено к <strong>${peerId.substring(0, 8)}...</strong>`;
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                messageInput.disabled = false;
                document.getElementById('sendBtn').disabled = false;
                addSystemMessage(`✅ Подключено! Теперь вы можете общаться.`);
            } else {
                statusText.innerHTML = `🟡 Не подключено | Ваш ID: ${myPeerIdSpan.textContent.substring(0, 8)}...`;
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('disconnectBtn').disabled = true;
                messageInput.disabled = true;
                document.getElementById('sendBtn').disabled = true;
                if (!connected && activeConnection) {
                    addSystemMessage(`🔌 Соединение разорвано`);
                }
                activeConnection = null;
            }
        }
        
        // Отправка сообщения
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            if (!activeConnection || !isConnected) {
                addSystemMessage('❌ Нет активного подключения! Сначала подключитесь к собеседнику.');
                return;
            }
            
            try {
                activeConnection.send({
                    type: 'message',
                    text: text,
                    time: Date.now()
                });
                addMessage(text, true);
                messageInput.value = '';
                messageInput.focus();
            } catch(e) {
                addSystemMessage(`❌ Ошибка отправки: ${e.message}`);
                updateStatus(false);
            }
        }
        
        // Настройка соединения
        function setupConnection(conn, isIncoming = false) {
            activeConnection = conn;
            
            conn.on('open', () => {
                updateStatus(true, conn.peer);
            });
            
            conn.on('data', (data) => {
                if (data.type === 'message') {
                    addMessage(data.text, false);
                }
            });
            
            conn.on('close', () => {
                updateStatus(false);
            });
            
            conn.on('error', (err) => {
                console.error('Connection error:', err);
                addSystemMessage(`⚠️ Ошибка соединения: ${err.message}`);
                updateStatus(false);
            });
            
            // Если это входящее соединение, сразу показываем статус
            if (isIncoming && conn.open) {
                updateStatus(true, conn.peer);
            }
        }
        
        // Подключение к собеседнику
        function connectToPeer(peerId) {
            if (!peer) {
                addSystemMessage('❌ Peer не инициализирован');
                return;
            }
            
            if (activeConnection) {
                addSystemMessage('⚠️ Сначала отключитесь от текущего собеседника');
                return;
            }
            
            addSystemMessage(`🔄 Подключение к ${peerId}...`);
            const conn = peer.connect(peerId);
            setupConnection(conn);
        }
        
        // Отключение
        function disconnect() {
            if (activeConnection) {
                activeConnection.close();
                activeConnection = null;
                updateStatus(false);
            }
        }
        
        // Инициализация PeerJS
        function initPeer() {
            // Генерируем случайный ID для большей приватности
            const randomId = 'user_' + Math.random().toString(36).substring(2, 10);
            
            peer = new Peer(randomId, {
                debug: 2,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });
            
            peer.on('open', (id) => {
                myPeerIdSpan.textContent = id;
                statusText.innerHTML = `🟡 Не подключено | Ваш ID: ${id.substring(0, 12)}...`;
                addSystemMessage(`🎉 Мессенджер готов! Ваш ID: ${id}`);
                addSystemMessage(`📋 Скопируйте этот ID и отправьте другу, либо введите его ID для подключения`);
            });
            
            peer.on('connection', (conn) => {
                addSystemMessage(`📞 Входящее подключение от ${conn.peer.substring(0, 8)}...`);
                if (activeConnection) {
                    addSystemMessage(`⚠️ Уже есть соединение, отклоняем новое`);
                    conn.close();
                    return;
                }
                setupConnection(conn, true);
            });
            
            peer.on('error', (err) => {
                console.error('Peer error:', err);
                if (err.type === 'peer-unavailable') {
                    addSystemMessage(`❌ Собеседник не найден. Проверьте ID и что у него открыт мессенджер.`);
                } else {
                    addSystemMessage(`❌ Ошибка: ${err.message}`);
                }
                updateStatus(false);
            });
            
            peer.on('disconnected', () => {
                addSystemMessage(`⚠️ Потеряно соединение с сервером, переподключение...`);
                peer.reconnect();
            });
        }
        
        // Копирование ID (доп. функционал)
        myPeerIdSpan.addEventListener('click', () => {
            const id = myPeerIdSpan.textContent;
            navigator.clipboard.writeText(id);
            addSystemMessage('📋 Ваш ID скопирован в буфер обмена!');
        });
        
        // Обработчики кнопок
        document.getElementById('connectBtn').onclick = () => {
            const targetId = document.getElementById('peerIdInput').value.trim();
            if (!targetId) {
                addSystemMessage('⚠️ Введите ID собеседника');
                return;
            }
            if (targetId === myPeerIdSpan.textContent) {
                addSystemMessage('⚠️ Нельзя подключиться к самому себе');
                return;
            }
            connectToPeer(targetId);
        };
        
        document.getElementById('disconnectBtn').onclick = disconnect;
        document.getElementById('sendBtn').onclick = sendMessage;
        
        // Ставим фокус на поле ввода при клике
        messageInput.addEventListener('focus', () => {
            if (isConnected) messageInput.placeholder = "Введите сообщение...";
            else messageInput.placeholder = "Сначала подключитесь к собеседнику";
        });
        
        // Запускаем
        initPeer();
        
        // Инструкция
        console.log('Мессенджер запущен! Чтобы общаться:');
        console.log('1. Отправьте свой ID другу (он вверху)');
        console.log('2. Друг вводит ваш ID и нажимает "Подключиться"');
        console.log('3. Общайтесь!');
    </script>
</body>
</html>
