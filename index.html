<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat {
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 700px;
            background: white;
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .header {
            background: #3b82f6;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .id-box {
            background: #e2e8f0;
            padding: 15px;
            text-align: center;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .connect-box {
            padding: 15px;
            background: #f8fafc;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #e2e8f0;
        }
        .connect-box input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f1f5f9;
        }
        .msg {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 75%;
            word-wrap: break-word;
        }
        .msg.sent {
            background: #3b82f6;
            color: white;
            margin-left: auto;
        }
        .msg.received {
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
        }
        .input-area {
            padding: 15px;
            background: white;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e2e8f0;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 25px;
            font-size: 16px;
        }
        .status {
            font-size: 12px;
            padding: 5px 15px;
            text-align: center;
            background: #f1f5f9;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
<div class="chat">
    <div class="header">
        <strong>💬 Простой чат</strong>
    </div>
    <div class="id-box" onclick="copyId()">
        📋 Ваш ID: <span id="myId">загрузка...</span>
    </div>
    <div class="connect-box">
        <input type="text" id="friendId" placeholder="Введите ID друга">
        <button id="connectBtn">Подключиться</button>
    </div>
    <div class="status" id="status">⚪ Не подключено</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
        <button id="sendBtn">📤</button>
    </div>
</div>

<script>
    let peer, conn, myIdValue;
    const messagesDiv = document.getElementById('messages');
    const statusDiv = document.getElementById('status');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    
    // Отключить отправку пока нет связи
    sendBtn.disabled = true;
    msgInput.disabled = true;
    
    function addMsg(text, isMe) {
        const div = document.createElement('div');
        div.className = 'msg ' + (isMe ? 'sent' : 'received');
        div.textContent = text;
        messagesDiv.appendChild(div);
        div.scrollIntoView();
    }
    
    function copyId() {
        if (myIdValue) {
            navigator.clipboard.writeText(myIdValue);
            alert('ID скопирован: ' + myIdValue);
        }
    }
    
    // Создаём peer с коротким ID
    let shortId = localStorage.getItem('shortId');
    if (!shortId) {
        shortId = prompt('Придумайте короткий ID (3-6 символов, латиница или цифры):', 'кот' + Math.floor(Math.random()*100));
        if (!shortId) shortId = 'user' + Math.floor(Math.random()*1000);
        localStorage.setItem('shortId', shortId);
    }
    
    peer = new Peer(shortId);
    
    peer.on('open', (id) => {
        myIdValue = id;
        document.getElementById('myId').textContent = id;
        statusDiv.innerHTML = '🟢 Ваш ID: ' + id + ' (нажми чтобы скопировать)';
    });
    
    peer.on('connection', (c) => {
        conn = c;
        setupConnection();
        statusDiv.innerHTML = '🟢 Подключено к ' + conn.peer;
        sendBtn.disabled = false;
        msgInput.disabled = false;
        addMsg('✅ Собеседник подключился', false);
    });
    
    peer.on('error', (err) => {
        if (err.type === 'peer-unavailable') {
            statusDiv.innerHTML = '🔴 Собеседник не найден';
        }
    });
    
    function setupConnection() {
        conn.on('data', (data) => {
            addMsg(data.text, false);
        });
        conn.on('close', () => {
            statusDiv.innerHTML = '⚪ Соединение разорвано';
            sendBtn.disabled = true;
            msgInput.disabled = true;
            addMsg('🔌 Собеседник отключился', false);
        });
    }
    
    document.getElementById('connectBtn').onclick = () => {
        const friendId = document.getElementById('friendId').value.trim();
        if (!friendId) return;
        if (conn) conn.close();
        conn = peer.connect(friendId);
        setupConnection();
        statusDiv.innerHTML = '🟡 Подключение к ' + friendId + '...';
    };
    
    function send() {
        const text = msgInput.value.trim();
        if (!text || !conn) return;
        conn.send({ text: text });
        addMsg(text, true);
        msgInput.value = '';
    }
    
    sendBtn.onclick = send;
    
    // Подсказка
    setTimeout(() => {
        addMsg('✨ Отправьте этот ID другу: ' + shortId, false);
        addMsg('💡 Друг вводит ваш ID и нажимает "Подключиться"', false);
    }, 1000);
</script>
</body>
</html>
